services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${PGUSER:-postgres}
      POSTGRES_PASSWORD: ${PGPASSWORD:-postgres}
      POSTGRES_DB: ${ZDBM_ADMIN_DB:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGUSER:-postgres}"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      ZDBM_ADDR: ":8080"
      PGHOST: db
      PGPORT: "5432"
      PGUSER: ${PGUSER:-postgres}
      PGPASSWORD: ${PGPASSWORD:-postgres}
      PGSSLMODE: disable
      ZDBM_ADMIN_DB: ${ZDBM_ADMIN_DB:-postgres}
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  pgdata:
