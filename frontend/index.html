<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Zahir Data Console</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='16' fill='%232479AE'/%3E%3Cpath d='M11 11 H21 L11 21 H21' fill='none' stroke='white' stroke-width='3' stroke-linejoin='round' stroke-linecap='round'/%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Mulish:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <a class="brand" href="./"><img class="brand-logo" src="./zahir-erp-white.png" alt="Zahir ERP"></a>
      <nav class="side-nav">
        <a data-view="db" class="active"><span class="ic">&#9636;</span> <span class="label">Databases</span></a>
        <a data-view="conn"><span class="ic">&#128268;</span> <span class="label">Connections</span></a>
        <a data-view="sql"><span class="ic">&#9000;</span> <span class="label">SQL Console</span></a>
      </nav>
      <div class="side-foot">Data Console</div>
    </aside>

    <div class="main-col">
      <header class="topbar">
        <div class="page-title" id="page-title">Databases</div>
        <div class="topbar-right">
          <span class="dot" id="dot" title="connection status"></span>
          <input id="api" type="url" placeholder="https://your-zahirdbman.onrender.com" autocomplete="url" spellcheck="false">
          <button id="connect" class="btn primary">Connect</button>
          <div class="avatar" title="Zahir Data Console">Z</div>
        </div>
      </header>

      <main class="content">
        <div id="banner" class="banner" hidden></div>

        <section id="tab-db">
          <div id="serverinfo"></div>
          <div class="page-head"><h2>Databases</h2></div>
          <div id="databases" class="muted">Enter your zahirdbman API URL above and click Connect.</div>
          <div id="tables"></div>
        </section>

        <section id="tab-conn" hidden>
          <div class="page-head row">
            <h2>Connections</h2>
            <button class="btn primary" id="conn-add">+ Add connection</button>
          </div>
          <div id="conn-list" class="muted">Connect to the API to load profiles.</div>
        </section>

        <section id="tab-sql" hidden>
          <div class="page-head"><h2>SQL Console</h2></div>
          <div class="sql-bar">
            <input id="qdb" placeholder="database (blank = admin)" spellcheck="false">
          </div>
          <textarea id="sql" spellcheck="false" placeholder="SELECT * FROM ..."></textarea>
          <div class="sql-actions">
            <button id="run" class="btn primary">Run</button>
            <span class="muted small">&#8984;/Ctrl + Enter</span>
          </div>
          <div id="qresult"></div>
        </section>
      </main>
    </div>
  </div>

  <dialog id="conn-dialog" class="modal">
    <form id="conn-form" class="modal-card">
      <div class="modal-head">
        <h3>Add connection</h3>
        <button type="button" class="modal-x" id="conn-x" aria-label="Close">&times;</button>
      </div>
      <div class="modal-body">
        <label>Profile name <input name="name" placeholder="e.g. Production" required></label>
        <div class="grid2">
          <label>Host <input name="host" value="localhost" required></label>
          <label>Port <input name="port" value="5432" required></label>
        </div>
        <div class="grid2">
          <label>User <input name="user" value="postgres" required></label>
          <label>Password <input name="password" type="password" autocomplete="new-password"></label>
        </div>
        <div class="grid2">
          <label>Admin database <input name="adminDB" value="postgres"></label>
          <label>SSL mode
            <select name="sslmode">
              <option>prefer</option><option>disable</option><option>require</option>
              <option>verify-ca</option><option>verify-full</option>
            </select>
          </label>
        </div>
        <label class="chk"><input type="checkbox" name="activate" checked> Connect to this profile after saving</label>
      </div>
      <div class="modal-foot">
        <button type="button" class="btn" id="conn-cancel">Cancel</button>
        <button type="submit" class="btn primary">Save</button>
      </div>
    </form>
  </dialog>

  <script src="./app.js"></script>
</body>
</html>
